# npm 發布 — Trusted Publishing(GitHub Actions OIDC,自動附 provenance,無長效 token)。
# 前置(flip 日,見 docs/design.md runbook):npmjs.com 套件設定把本 repo + 本 workflow 登記為 trusted publisher。
# 觸發:GitHub Release 發布時。發布前先跑 smoke,綠了才 publish。
name: release
on:
  release:
    types: [published]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC:Trusted Publishing + provenance 需要
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: bash test/smoke.sh
      - run: npm publish --provenance --access public
